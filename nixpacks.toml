[phases.setup]
nixPkgs = ["php83", "php83Extensions.mbstring", "php83Extensions.dom", "php83Extensions.curl", "php83Extensions.sqlite3", "php83Extensions.gd"]

[phases.install]
cmds = ["curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer", "composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[phases.start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
